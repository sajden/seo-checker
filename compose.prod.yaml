services:
  seo-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    env_file:
      - .env.local
    environment:
      DATA_DIR: /data
      PORT: 3010
      HOSTNAME: 0.0.0.0
    volumes:
      - ${DATA_HOST_DIR:-/opt/ai-dashboard/data/seo-monitor}:/data
      - ${WORKSPACE_HOST_DIR:-/home/sajden/github}:/workspace:ro
    networks:
      - default
      - article-generator
    restart: unless-stopped

networks:
  article-generator:
    external: true
    name: article-generator_default
